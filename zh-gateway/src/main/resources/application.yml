server:
  port: 8081 # 认证服务自己占用 8081 端口

spring:
  application:
    name: zh-gateway # 注册到 Nacos 里的服务名

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848 # Nacos 地址

  # 🌟 新增：Redis 连接配置 (Spring Boot 3.x 标准写法)
  data:
    redis:
      host: 127.0.0.1      # Redis 服务器地址（本地跑就是 127.0.0.1）
      port: 6379      # Redis 默认端口
      userName: root
      password: root         # Redis 密码（如果你本地没设密码，就留空或干脆删掉这行）
      database: 0          # 使用 0 号数据库（Redis 默认有 0-15 共 16 个库）
      lettuce:
        pool:
          max-active: 8    # 连接池最大连接数（使用负值表示没有限制）
          max-idle: 8      # 连接池中的最大空闲连接
          min-idle: 0      # 连接池中的最小空闲连接
          max-wait: 10000ms # 连接池最大阻塞等待时间

  gateway:
    discovery:
      locator:
        enabled: true # 开启从注册中心动态发现服务
        lower-case-service-id: true # 服务名统一转为小写

    # 核心：手动路由规则配置
    routes:
      # --- 🌟 路由到咱们刚写好的认证服务 ---
      - id: auth_service_route             # 路由 ID，全局唯一即可
        uri: lb://zh-auth                  # lb:// 代表开启负载均衡，去 Nacos 里找名为 zh-auth 的服务
        predicates:
          - Path=/auth/** # 断言：当前端访问 http://localhost:8080/api/auth/login 时，触发此规则转发

