server.port=8081

spring.application.name=zh-gateway
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848

spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.username=root
spring.data.redis.password=root
spring.data.redis.database=0
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=10000ms

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.routes[0].id=auth_service_route
spring.cloud.gateway.routes[0].uri=lb://zh-auth
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

logging.file.path=logs
