# 基础服务配置
server.port=8082

# 微服务注册中心配置 (Nacos)
spring.application.name=zh-auth
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848

# 数据库连接配置
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/zh-diyproject?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&verifyServerCertificate=false&useSSL=false
spring.datasource.username=root
spring.datasource.password=root123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis 配置
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.username=root
spring.data.redis.password=root
spring.data.redis.database=0
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=10000ms

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath*:/com.xzh.mapper/*.xml
mybatis-plus.type-aliases-package=com.xzh.bean
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl



